<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <i class="ri-trello-fill"></i>
            <h3>Trello</h3>
        </div>
        <div class="header-right">
            <button id="add-todo-task">+ Add Task</button>
        </div>

    </header>
    <main>
        <section class="column column1">
            <div class="heading">
                <h2>To Do</h2>
            </div>
            <div class="tasks">

            </div>
        </section>
        <section class="column column2">
            <div class="heading">
                <h2>Doing</h2>
            </div>
            <div class="tasks">
            </div>
        </section>
        <section class="column column3">
            <div class="heading">
                <h2>Done</h2>
            </div>
            <div class="tasks">
            </div>
        </section>

        <div class="modal" id="add-task-modal">
            <form class="modal-content">
                <h2>Add Task</h2>

                <input type="text" id="task-title" placeholder="Task Title" required>
                <textarea id="task-description" placeholder="Task Description" required></textarea>
                <select name="status" id="task-status">
                    <option value="todo">To Do</option>
                    <option value="doing">Doing</option>
                    <option value="done">Done</option>
                </select>
                <div class="actions">
                    <button type="submit" id="task-add-btn">Add Task</button>
                    <button id="task-cancel-btn">Cancel</button>
                </div>

            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
