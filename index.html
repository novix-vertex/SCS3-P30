<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <i class="ri-trello-fill"></i>
            <h3>Trello</h3>
        </div>
        <div class="header-center">
            <i class="ri-search-line"></i>
            <input type="search" id="search" placeholder="Search...">
        </div>
        <div class="header-right">
            <button id="add-todo-task-btn">+ Add Task</button>
            <button id="filter-todo-task-btn">Filter</button>
            <button id="clear-all-todo-task-btn">Clear All</button>
            <button id="change-theme-btn">Change Theme</button>
        </div>

    </header>
    <main>
        <section class="column column1">
            <div class="heading">
                <div class="head">
                    <h2>To Do</h2>
                    <h4 class="total"></h4>
                </div>
            </div>
            <div class="tasks">

            </div>
        </section>
        <section class="column column2">
            <div class="heading">
                <div class="head">
                    <h2>Doing</h2>
                    <h4 class="total"></h4>
                </div>
            </div>
            <div class="tasks">
            </div>
        </section>
        <section class="column column3">
            <div class="heading">
                <div class="head">
                    <h2>Done</h2>
                    <h4 class="total"></h4>
                </div>
            </div>
            <div class="tasks">
            </div>
        </section>
        <section class="modal" id="add-task-modal">
            <form class="modal-content" name="add-form">
                <h2>Add Task</h2>

                <input type="text" id="task-title" placeholder="Task Title" required>
                <textarea id="task-description" placeholder="Task Description" required></textarea>
                <select name="category" id="task-category">
                    <option value="office">Office</option>
                    <option value="personal">Personal</option>
                    <option value="learning">Learning</option>
                    <option value="other">Other</option>
                </select>
                <select name="status" id="task-status">
                    <option value="todo">To Do</option>
                    <option value="doing">Doing</option>
                    <option value="done">Done</option>
                </select>
                <div class="actions">
                    <button type="submit" id="task-add-btn">Add Task</button>
                    <button id="task-cancel-btn">Cancel</button>
                </div>

            </form>
        </section>
        <aside class="filter-dialog">
            <form class="filter-content" name="filters-form">
                <h2>Filters</h2>
                <h5>Status</h5>
                <select name="filter-task-category" id="filter-task-category">
                    <option value="">All</option>
                    <option value="office">Office</option>
                    <option value="personal">Personal</option>
                    <option value="learning">Learning</option>
                    <option value="other">Other</option>
                </select>
                <div class="actions">
                    <button type="submit" id="filter-btn">Apply Filter</button>
                </div>
            </form>
        </aside>
    </main>
    <script src="script.js" defer></script>
</body>

</html>
